<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#08131c">
<title>GeoVoxel — Real Map Reconstruction</title>
<style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#9fc3d4;font-family:system-ui,-apple-system,Segoe UI,sans-serif}canvas{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none}.panel{position:fixed;z-index:10;top:max(12px,env(safe-area-inset-top));left:max(12px,env(safe-area-inset-left));width:min(430px,calc(100vw - 24px));padding:14px;border-radius:17px;background:#07141dec;color:#eef8fb;box-shadow:0 18px 60px #00101880;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}h1{font-size:18px;margin:0;letter-spacing:.12em}.sub{margin:6px 0 11px;color:#b8cad2;font-size:12px}.row{display:flex;gap:8px;margin-top:8px}.row>*{min-width:0}input,select,button,a.action{height:40px;border:0;border-radius:10px;font:inherit}input,select{width:100%;padding:0 10px;color:#142029;background:#eff6f8}select{flex:1}button,a.action{display:inline-flex;align-items:center;justify-content:center;padding:0 14px;cursor:pointer;font-weight:800;color:#14200d;background:#bafd67;text-decoration:none}button.alt,a.action.alt{color:#142029;background:#dae9ee}button:disabled{opacity:.55}.coords{display:grid;grid-template-columns:1fr 1fr 42px;gap:8px}.options{display:grid;grid-template-columns:1fr 1fr;gap:8px}.field{display:flex;flex-direction:column;gap:4px}.field label{font-size:9px;text-transform:uppercase;letter-spacing:.09em;color:#8fa8b4}.status{min-height:36px;margin-top:10px;font-size:12px;line-height:1.4;color:#d1e1e7}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}.stat{padding:7px 4px;border-radius:8px;text-align:center;background:#ffffff0b;font-size:9px;color:#91aab5}.stat strong{display:block;color:#fff;font-size:14px}.legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:9px;font-size:9px;color:#9eb2bb}.sw{width:8px;height:8px;border-radius:2px;display:inline-block;margin-right:3px}.help{position:fixed;right:12px;bottom:max(12px,env(safe-area-inset-bottom));z-index:5;padding:9px 11px;border-radius:11px;background:#07141dc9;color:#d6e4e9;font-size:10px}.north{position:fixed;right:15px;top:max(15px,env(safe-area-inset-top));z-index:5;width:42px;height:42px;border-radius:50%;display:grid;place-items:center;background:#07141dcc;color:#fff;font-weight:900;font-size:12px}.north:after{content:'↑';display:block;position:absolute;top:2px;font-size:20px;color:#bafd67}.loading{position:fixed;inset:0;z-index:50;display:grid;place-items:center;background:#08131c;color:#eef8fb;text-align:center;padding:24px}.loading[hidden]{display:none}@media(max-width:640px){.panel{padding:12px;width:min(400px,calc(100vw - 24px))}.stats,.legend,.help{display:none}.sub{max-width:300px}.options{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<canvas id="view"></canvas>
<section class="panel">
<h1>GEOVOXEL</h1>
<p class="sub">Exact OpenStreetMap roads, footprints, parks and water reconstructed as a voxel-style 3D neighborhood.</p>
<div class="row"><select id="preset"><option value="45.5231,-122.6765">Portland, Oregon</option><option value="40.7411,-73.9897">Manhattan, New York</option><option value="34.0195,-118.4912">Santa Monica, California</option><option value="41.9028,12.4964">Rome, Italy</option><option value="35.6812,139.7671">Tokyo, Japan</option></select><button id="build">Build map</button></div>
<div class="coords row"><div class="field"><label>Latitude</label><input id="lat" value="45.5231" inputmode="decimal"></div><div class="field"><label>Longitude</label><input id="lon" value="-122.6765" inputmode="decimal"></div><button id="locate" class="alt" aria-label="Use my location">◎</button></div>
<div class="options row"><div class="field"><label>Map radius</label><select id="radius"><option value="180">180 m — fast</option><option value="260" selected>260 m — normal</option><option value="380">380 m — detailed</option></select></div><div class="field"><label>Voxel size</label><select id="voxel"><option value="0">Exact geometry</option><option value="1">1 m voxels</option><option value="2" selected>2 m voxels</option><option value="4">4 m voxels</option></select></div></div>
<div class="row"><a id="osmLink" class="action alt" target="_blank" rel="noopener" style="flex:1">Compare on OSM</a><button id="reset" class="alt">Reset view</button></div>
<div id="status" class="status">Loading 3D engine…</div>
<div class="stats"><div class="stat"><strong id="buildings">0</strong>buildings</div><div class="stat"><strong id="roads">0</strong>roads</div><div class="stat"><strong id="areas">0</strong>areas</div><div class="stat"><strong id="source">—</strong>source</div></div>
<div class="legend"><span><i class="sw" style="background:#d5c19b"></i>buildings</span><span><i class="sw" style="background:#59636a"></i>roads</span><span><i class="sw" style="background:#6e9770"></i>parks</span><span><i class="sw" style="background:#69a9c3"></i>water</span></div>
</section>
<div class="north">N</div><div class="help">Drag to orbit · pinch to zoom · two-finger drag to pan</div><div id="loading" class="loading"><div><h2>GEOVOXEL</h2><p>Loading the 3D renderer…</p></div></div>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(()=>{
'use strict';
const $=s=>document.querySelector(s),status=$('#status'),loading=$('#loading');
if(!window.THREE){loading.innerHTML='<div><h2>Could not load 3D engine</h2><p>Open this page in Safari and check your internet connection.</p></div>';return}
const scene=new THREE.Scene();scene.background=new THREE.Color(0x9fc3d4);scene.fog=new THREE.Fog(0x9fc3d4,350,1050);
const camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,.1,2200);
const renderer=new THREE.WebGLRenderer({canvas:$('#view'),antialias:true,powerPreference:'high-performance'});renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.setSize(innerWidth,innerHeight);renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;renderer.outputEncoding=THREE.sRGBEncoding;
const controls=new THREE.OrbitControls(camera,renderer.domElement);controls.enableDamping=true;controls.dampingFactor=.06;controls.maxPolarAngle=Math.PI*.49;controls.minDistance=20;controls.maxDistance=900;
scene.add(new THREE.HemisphereLight(0xe9f8ff,0x536449,1.85));const sun=new THREE.DirectionalLight(0xfff1d2,1.65);sun.position.set(-180,260,120);sun.castShadow=true;sun.shadow.mapSize.set(2048,2048);sun.shadow.camera.left=-450;sun.shadow.camera.right=450;sun.shadow.camera.top=450;sun.shadow.camera.bottom=-450;scene.add(sun);
const world=new THREE.Group();scene.add(world);
const mats={ground:new THREE.MeshStandardMaterial({color:0x879d78,roughness:1}),road:{},area:{},edge:new THREE.LineBasicMaterial({color:0x243038,transparent:true,opacity:.38}),water:new THREE.MeshStandardMaterial({color:0x69a9c3,roughness:.38,metalness:.04,transparent:true,opacity:.94}),rail:new THREE.MeshStandardMaterial({color:0x45484a,roughness:1})};
const buildingPalette=[0xd8c59f,0xc9ad83,0xbcc0b8,0xc58e77,0xddd3bd,0xa5aca4,0xc7bba7];
let lastData=null,lastCenter=null,lastRadius=260,activeController=null;
function sharedRoadMat(color){const key=String(color);return mats.road[key]||(mats.road[key]=new THREE.MeshStandardMaterial({color,roughness:1,polygonOffset:true,polygonOffsetFactor:-1}))}
function sharedAreaMat(color){const key=String(color);return mats.area[key]||(mats.area[key]=new THREE.MeshStandardMaterial({color,roughness:1,side:THREE.DoubleSide}))}
function clear(){while(world.children.length){const o=world.children.pop();o.traverse&&o.traverse(x=>{if(x.geometry)x.geometry.dispose();if(x.material&&!Object.values(mats).includes(x.material)&&!Object.values(mats.road).includes(x.material)&&!Object.values(mats.area).includes(x.material)){if(Array.isArray(x.material))x.material.forEach(m=>m.dispose());else x.material.dispose()}})}}
function hash(v){let h=2166136261;const s=String(v);for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)}return h>>>0}
function meters(lat,lon,lat0,lon0){return[(lon-lon0)*111320*Math.cos(lat0*Math.PI/180),(lat-lat0)*110540]}
function snap(v,size){return size?Math.round(v/size)*size:v}
function cleanPoints(geometry,lat,lon,voxel,closed=false){if(!geometry)return[];const pts=[];for(const p of geometry){if(!Number.isFinite(p.lat)||!Number.isFinite(p.lon))continue;const m=meters(p.lat,p.lon,lat,lon),q={x:snap(m[0],voxel),z:snap(m[1],voxel)};const prev=pts[pts.length-1];if(!prev||Math.hypot(q.x-prev.x,q.z-prev.z)>.15)pts.push(q)}if(closed&&pts.length>2){const a=pts[0],b=pts[pts.length-1];if(Math.hypot(a.x-b.x,a.z-b.z)>.15)pts.push({x:a.x,z:a.z})}return pts}
function parseMeters(v){if(v==null)return NaN;const s=String(v).trim();const n=parseFloat(s);if(!Number.isFinite(n))return NaN;if(/ft|feet|foot|'/i.test(s))return n*.3048;return n}
function buildingHeight(tags,id){let h=parseMeters(tags&&tags.height);if(Number.isFinite(h))return Math.max(3,Math.min(150,h));const levels=parseFloat(tags&&tags['building:levels']);if(Number.isFinite(levels))return Math.max(3,Math.min(150,levels*3.15));const type=(tags&&tags.building)||'';if(['garage','garages','shed','roof','carport'].includes(type))return 3.2;const r=hash(id)%1000/1000;return 6+Math.pow(r,1.65)*24}
function buildingColor(tags,id){const material=((tags&&tags['building:material'])||'').toLowerCase();if(material.includes('brick'))return 0xb97961;if(material.includes('glass'))return 0x91adb4;if(material.includes('concrete'))return 0xb8b6ae;if(material.includes('wood'))return 0xb18c66;return buildingPalette[hash(id)%buildingPalette.length]}
function makeShape(points){if(points.length<3)return null;const unique=points.slice();const first=unique[0],last=unique[unique.length-1];if(Math.hypot(first.x-last.x,first.z-last.z)<.2)unique.pop();if(unique.length<3)return null;const shape=new THREE.Shape();shape.moveTo(unique[0].x,-unique[0].z);for(let i=1;i<unique.length;i++)shape.lineTo(unique[i].x,-unique[i].z);shape.closePath();return shape}
function addArea(points,color,y=.01,opacity=1){const shape=makeShape(points);if(!shape)return false;try{const geo=new THREE.ShapeGeometry(shape);geo.rotateX(-Math.PI/2);const mat=opacity===1?sharedAreaMat(color):new THREE.MeshStandardMaterial({color,roughness:1,side:THREE.DoubleSide,transparent:true,opacity});const mesh=new THREE.Mesh(geo,mat);mesh.position.y=y;mesh.receiveShadow=true;world.add(mesh);return true}catch(e){return false}}
function addBuilding(points,h,color){const shape=makeShape(points);if(!shape)return false;try{const geo=new THREE.ExtrudeGeometry(shape,{depth:h,bevelEnabled:false,steps:1,curveSegments:1});geo.rotateX(-Math.PI/2);geo.computeVertexNormals();const mat=new THREE.MeshStandardMaterial({color,roughness:.9,flatShading:true});const mesh=new THREE.Mesh(geo,mat);mesh.castShadow=true;mesh.receiveShadow=true;world.add(mesh);const edges=new THREE.LineSegments(new THREE.EdgesGeometry(geo,28),mats.edge);world.add(edges);return true}catch(e){return false}}
function addRibbon(points,width,color,y=.09){if(points.length<2)return 0;const mat=sharedRoadMat(color);let count=0;for(let i=1;i<points.length;i++){const a=points[i-1],b=points[i],dx=b.x-a.x,dz=b.z-a.z,len=Math.hypot(dx,dz);if(len<.4)continue;const geo=new THREE.BoxGeometry(len,.13,width);const mesh=new THREE.Mesh(geo,mat);mesh.position.set((a.x+b.x)/2,y,(a.z+b.z)/2);mesh.rotation.y=-Math.atan2(dz,dx);mesh.receiveShadow=true;world.add(mesh);count++}return count}
function roadStyle(tags){const h=(tags&&tags.highway)||'';if(['motorway','trunk'].includes(h))return{w:12,c:0x4e575d};if(['primary','secondary'].includes(h))return{w:9,c:0x555f65};if(['tertiary','residential','unclassified'].includes(h))return{w:6.5,c:0x5b656a};if(['service','living_street'].includes(h))return{w:4.5,c:0x636c70};if(['pedestrian','footway','path','cycleway','steps'].includes(h))return{w:2.2,c:0x9b927d};return{w:4,c:0x626a6e}}
function areaStyle(tags){const natural=tags&&tags.natural,land=tags&&tags.landuse,leisure=tags&&tags.leisure;if(natural==='water'||land==='reservoir'||land==='basin')return{c:0x69a9c3,y:.035,water:true};if(natural==='wood'||land==='forest')return{c:0x547c58,y:.025};if(leisure==='park'||leisure==='garden')return{c:0x6d9870,y:.025};if(leisure==='pitch')return{c:0x72906b,y:.026};if(['grass','meadow','recreation_ground','village_green','cemetery'].includes(land))return{c:0x76956d,y:.02};if(['commercial','retail'].includes(land))return{c:0x9b8f82,y:.015};if(land==='industrial')return{c:0x8c8a82,y:.015};return{c:0x829775,y:.012}}
function geometries(el){if(el.type==='way'&&el.geometry)return[{geometry:el.geometry,id:el.id,tags:el.tags||{}}];if(el.type==='relation'&&el.members){return el.members.filter(m=>m.type==='way'&&m.geometry&&(!m.role||m.role==='outer')).map((m,i)=>({geometry:m.geometry,id:el.id+'-'+i,tags:el.tags||{}}))}return[]}
function addGround(radius){const size=radius*2.45;const base=new THREE.Mesh(new THREE.BoxGeometry(size,5,size),mats.ground);base.position.y=-2.55;base.receiveShadow=true;world.add(base);const grid=new THREE.GridHelper(size,Math.max(8,Math.round(size/25)),0x536c58,0x738975);grid.position.y=.005;grid.material.opacity=.13;grid.material.transparent=true;world.add(grid);const ring=new THREE.Mesh(new THREE.RingGeometry(radius*.99,radius,128),new THREE.MeshBasicMaterial({color:0xc7e3bd,side:THREE.DoubleSide,transparent:true,opacity:.35}));ring.rotateX(-Math.PI/2);ring.position.y=.02;world.add(ring)}
function fitView(radius){camera.position.set(radius*.72,radius*.62,radius*.88);controls.target.set(0,8,0);controls.maxDistance=radius*3;controls.update()}
function within(points,radius){if(!points.length)return false;let x=0,z=0;for(const p of points){x+=p.x;z+=p.z}x/=points.length;z/=points.length;return Math.hypot(x,z)<radius*1.35}
function rebuild(data,lat,lon,radius){clear();addGround(radius);fitView(radius);const voxel=parseFloat($('#voxel').value)||0;let buildings=0,roads=0,areas=0;const areaEls=[],roadEls=[],buildingEls=[];for(const el of data.elements||[]){const t=el.tags||{};if(t.building)buildingEls.push(el);else if(t.highway||t.railway||t.waterway)roadEls.push(el);else if(t.natural||t.landuse||t.leisure)areaEls.push(el)}
for(const el of areaEls)for(const g of geometries(el)){const pts=cleanPoints(g.geometry,lat,lon,voxel,true);if(pts.length<3||!within(pts,radius))continue;const style=areaStyle(g.tags);if(addArea(pts,style.c,style.y,style.water?.94:1))areas++}
for(const el of roadEls)for(const g of geometries(el)){const pts=cleanPoints(g.geometry,lat,lon,voxel,false);if(pts.length<2||!within(pts,radius))continue;if(g.tags.waterway){roads+=addRibbon(pts,Math.max(2,parseFloat(g.tags.width)||3.5),0x5f9fbb,.055)>0?1:0}else if(g.tags.railway){roads+=addRibbon(pts,2.2,0x46494b,.085)>0?1:0}else{const s=roadStyle(g.tags);roads+=addRibbon(pts,s.w,s.c,.09)>0?1:0}}
for(const el of buildingEls){if(buildings>=700)break;for(const g of geometries(el)){if(buildings>=700)break;const pts=cleanPoints(g.geometry,lat,lon,voxel,true);if(pts.length<4||!within(pts,radius))continue;if(addBuilding(pts,buildingHeight(g.tags,g.id),buildingColor(g.tags,g.id)))buildings++}}
$('#buildings').textContent=buildings;$('#roads').textContent=roads;$('#areas').textContent=areas;$('#source').textContent='OSM';status.textContent=`Mapped ${buildings} buildings, ${roads} roads and ${areas} land/water areas near ${lat.toFixed(4)}, ${lon.toFixed(4)}. Geometry follows OpenStreetMap.`;updateOsmLink(lat,lon)}
function updateOsmLink(lat,lon){$('#osmLink').href=`https://www.openstreetmap.org/#map=18/${lat}/${lon}`}
function cacheKey(lat,lon,radius){return`geovoxel:${lat.toFixed(4)}:${lon.toFixed(4)}:${radius}`}
function readCache(key){try{const v=JSON.parse(localStorage.getItem(key));if(v&&Date.now()-v.time<86400000)return v.data}catch(e){}return null}
function writeCache(key,data){try{localStorage.setItem(key,JSON.stringify({time:Date.now(),data}))}catch(e){}}
async function requestMap(lat,lon,radius){const q=`[out:json][timeout:32];(way["building"](around:${radius},${lat},${lon});relation["building"](around:${radius},${lat},${lon});way["highway"](around:${radius},${lat},${lon});way["railway"](around:${radius},${lat},${lon});way["waterway"](around:${radius},${lat},${lon});way["natural"="water"](around:${radius},${lat},${lon});relation["natural"="water"](around:${radius},${lat},${lon});way["natural"="wood"](around:${radius},${lat},${lon});relation["natural"="wood"](around:${radius},${lat},${lon});way["landuse"~"grass|forest|meadow|recreation_ground|village_green|cemetery|reservoir|basin|commercial|retail|industrial"](around:${radius},${lat},${lon});relation["landuse"~"grass|forest|meadow|recreation_ground|village_green|cemetery|reservoir|basin|commercial|retail|industrial"](around:${radius},${lat},${lon});way["leisure"~"park|garden|pitch|playground"](around:${radius},${lat},${lon});relation["leisure"~"park|garden|pitch|playground"](around:${radius},${lat},${lon}););out geom;`;
const servers=['https://overpass-api.de/api/interpreter','https://overpass.kumi.systems/api/interpreter'];let lastError=null;activeController&&activeController.abort();activeController=new AbortController();for(const server of servers){try{const timer=setTimeout(()=>activeController.abort(),26000);const r=await fetch(server+'?data='+encodeURIComponent(q),{signal:activeController.signal,headers:{Accept:'application/json'}});clearTimeout(timer);if(!r.ok)throw Error('HTTP '+r.status);const data=await r.json();if(!data||!Array.isArray(data.elements))throw Error('Invalid map response');return data}catch(e){lastError=e;if(e.name==='AbortError')activeController=new AbortController()}}throw lastError||Error('No map server responded')}
async function build(){const lat=parseFloat($('#lat').value),lon=parseFloat($('#lon').value),radius=parseInt($('#radius').value,10);if(!Number.isFinite(lat)||!Number.isFinite(lon)){status.textContent='Enter valid coordinates.';return}$('#build').disabled=true;updateOsmLink(lat,lon);const key=cacheKey(lat,lon,radius),cached=readCache(key);try{if(cached){lastData=cached;lastCenter={lat,lon};lastRadius=radius;rebuild(cached,lat,lon,radius);status.textContent+=' Loaded from the local cache.';return}status.textContent='Downloading real roads, footprints, parks and water from OpenStreetMap…';const data=await requestMap(lat,lon,radius);lastData=data;lastCenter={lat,lon};lastRadius=radius;writeCache(key,data);rebuild(data,lat,lon,radius)}catch(e){console.error(e);status.textContent='The OpenStreetMap query failed or timed out. No fake city was substituted—tap Build to retry, or choose the 180 m radius.';$('#source').textContent='error'}finally{$('#build').disabled=false}}
$('#preset').onchange=e=>{const [a,b]=e.target.value.split(',');$('#lat').value=a;$('#lon').value=b;updateOsmLink(+a,+b)};$('#build').onclick=build;$('#voxel').onchange=()=>{if(lastData&&lastCenter)rebuild(lastData,lastCenter.lat,lastCenter.lon,lastRadius)};$('#reset').onclick=()=>fitView(lastRadius);$('#locate').onclick=()=>navigator.geolocation?navigator.geolocation.getCurrentPosition(p=>{$('#lat').value=p.coords.latitude.toFixed(6);$('#lon').value=p.coords.longitude.toFixed(6);build()},()=>status.textContent='Location permission was not granted.',{enableHighAccuracy:true,timeout:10000}):status.textContent='Geolocation is unavailable.';
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});renderer.setAnimationLoop(()=>{controls.update();renderer.render(scene,camera)});updateOsmLink(45.5231,-122.6765);addGround(260);fitView(260);loading.hidden=true;build();
})();
</script>
</body>
</html>
